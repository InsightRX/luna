general:
  list:
    columns:
      id: true
      reference: false
      description: true
      tag: false
      notes: true
      tools: true
      status: true
      ofv: true
      finished: true
  runs:
    as_job: true

file_extensions:
  model: mod
  output: lst

tools:
  modelfit:
    # Supported methods: "pharmpy" (default), "psn", "nmfe", "ferx"
    # For method "ferx", also set: data: <path/to/data.csv>
    method: pharmpy
    console: true
  bootstrap:
    method: pharmpy
    samples: 500
  vpc:
    method: pharmpy
    samples: 500
