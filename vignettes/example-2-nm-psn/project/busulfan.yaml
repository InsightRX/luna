project:
  description: Busulfan popPK model building via PsN
runs:
- id: run1
  description: run1 - 1-compartment base model, no covariates, proportional RUV
- id: run2
  description: run2 - 2-compartment base model, no covariates, proportional+additive
    RUV
- id: run3
  description: run3 - 2-cmt + allometric weight scaling on CL and V (fixed exponents)
- id: run4
  description: run4 - 2-cmt + WT allometry + SEX effect on CL (tested, not adopted)
- id: run5
  description: run5 - 2-cmt + WT allometry + IOV on CL (final model)
